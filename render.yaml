services:
  # ---------------------------------------------------------------------------------
  # 1) WhatsApp Webhook Bot (Public Web Service)
  # ---------------------------------------------------------------------------------
  - type: web
    name: opptracker-whatsapp
    env: node
    buildCommand: npm install
    startCommand: npm run whatsapp
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  # ---------------------------------------------------------------------------------
  # 2) Telegram Bot (Background Worker)
  # ---------------------------------------------------------------------------------
  - type: worker
    name: opptracker-telegram
    env: node
    buildCommand: npm install
    startCommand: npm run bot
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # ---------------------------------------------------------------------------------
  # 3) Reminders Cron Job (Background Worker)
  # ---------------------------------------------------------------------------------
  - type: worker
    name: opptracker-reminders
    env: node
    buildCommand: npm install
    startCommand: npm run reminder
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
